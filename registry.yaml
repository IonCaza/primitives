# Primitives Registry
# Index of all available primitives in this repository.
# Each entry points to a primitive directory containing a manifest.yaml.

primitives:
  - name: agentic-ai-engine
    path: agentic-ai-engine/
    description: >
      Full-stack multi-agent AI engine with LangGraph supervisor pattern,
      DB-driven agent configuration, 3-tier memory, SSE streaming,
      and assistant-ui chat interface.
    status: active

  - name: observability
    path: observability/
    description: >
      Full observability stack with OpenTelemetry, Grafana, Tempo,
      Prometheus, Loki, and Langfuse for LLM tracing.
    status: active

  - name: authentication
    path: authentication/
    description: >
      Full-stack authentication with pluggable providers (local + OIDC/OAuth2),
      multi-factor authentication (TOTP + email OTP + recovery codes), JWT tokens,
      Fernet credential vaulting, admin user management, SMTP email delivery, and
      complete React login/MFA/OIDC UI.
    status: active

  - name: presentation-studio
    path: presentation-studio/
    description: >
      AI-powered presentation studio for generating interactive dashboards
      from project data. Agent generates React component code rendered in a
      sandboxed iframe with live data access via a PostMessage bridge.
      Includes versioned HTML templates, a data proxy, color palette picker,
      and full CRUD with version history. Requires agentic-ai-engine.
    status: active

  - name: cornerstone
    path: cornerstone/
    description: >
      Foundational application scaffold providing monorepo structure,
      Docker Compose orchestration (PostgreSQL + Redis + backend + frontend),
      FastAPI + async SQLAlchemy + Alembic backend skeleton,
      Next.js 16 + React 19 + Tailwind v4 + shadcn/ui frontend skeleton,
      dev/prod Dockerfiles, API proxy, and environment management.
      Root primitive with no dependencies -- all other primitives build on this.
    status: active

  - name: async-jobs
    path: async-jobs/
    description: >
      Celery-based async job execution pipeline with Redis-backed structured
      logging, SSE real-time log streaming, cooperative cancellation, stale job
      detection, and a terminal-style React log viewer with polling hooks.
      Depends on cornerstone for base infrastructure (Redis, FastAPI, Next.js).
    status: active
