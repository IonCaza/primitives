name: observability
version: "2.0.0"
description: >
  Full observability stack: OpenTelemetry Collector + Grafana Tempo
  (distributed tracing), Prometheus (metrics), Loki (logs), Grafana
  (visualization), and Langfuse v3 (LLM/agent tracing with ClickHouse
  analytics, async worker, and S3/MinIO blob storage). The Python module
  provides Langfuse callback handlers and trace propagation; OTel SDK
  setup is handled via environment-based auto-instrumentation.

stack:
  frontend: []
  backend: [python, fastapi, langfuse]
  persistence: []
  infrastructure: [docker, otel-collector, grafana, tempo, prometheus, loki, langfuse, clickhouse, minio]

requires_primitives:
  - name: agentic-ai-engine
    reason: "Langfuse callbacks instrument agent LLM calls in the agent engine"
    optional: true
  - name: cornerstone
    reason: "Redis service is shared with Langfuse v3 worker"
    optional: true

provides:
  database_models: []
  api_routes: []
  frontend_components: []
  infrastructure_services:
    - otel-collector (OTLP receiver, routes to Tempo/Prometheus/Loki) [optional]
    - tempo (distributed trace storage) [optional]
    - prometheus (metrics storage + scraping) [optional]
    - loki (log aggregation) [optional]
    - grafana (visualization dashboards) [optional]
    - langfuse + langfuse-db + langfuse-worker + langfuse-clickhouse (LLM/agent trace analysis)
    - minio (S3-compatible blob store for Langfuse event/media uploads)

extension_points:
  - name: "Grafana dashboards"
    location: "config/grafana/provisioning/dashboards/"
    description: >
      Add JSON dashboard files for domain-specific visualizations.
  - name: "Prometheus alerts"
    location: "config/prometheus.yaml"
    description: >
      Add alerting rules to the Prometheus configuration.
  - name: "Custom Langfuse callbacks"
    location: "backend/core/telemetry.py"
    description: >
      Use create_langfuse_handler() and langfuse_propagate_attributes()
      to instrument custom LLM call patterns.

